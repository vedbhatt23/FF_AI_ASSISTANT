services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: insights-backend
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data/db
      - chroma-data:/app/data/chroma_db
    env_file:
      - ./backend/.env
    restart: unless-stopped
    networks:
      - insights-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: insights-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - insights-network

volumes:
  backend-data:
  chroma-data:

networks:
  insights-network:
    driver: bridge
